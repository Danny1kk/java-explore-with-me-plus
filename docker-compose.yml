version: '3.8'

services:
  # Наш сервис статистики
  stats-server:
    build: ./stats-service/server  # Путь к папке, где лежит Dockerfile
    container_name: stats-server
    ports:
      - "9090:9090"
    environment:
      # Передаем настройки
      - SPRING_DATASOURCE_URL=jdbc:postgresql://stats-db:5432/stats
      - SPRING_DATASOURCE_USERNAME=practicum
      - SPRING_DATASOURCE_PASSWORD=practicum
    depends_on:
      - stats-db

  # База данных для статистики
  stats-db:
    image: postgres:14-alpine # Alpine — значит "легкий", чтобы быстрее качалось
    container_name: stats-db
    ports:
      - "6543:5432" # 6543 — чтобы зайти в базу через IDEA и не путать с основной
    environment:
      - POSTGRES_DB=stats
      - POSTGRES_USER=practicum
      - POSTGRES_PASSWORD=practicum

  # Основной сервис
  ewm-service:
    build: ./ewm-service
    container_name: ewm-service
    ports:
      - "8080:8080"
    depends_on:
      - ewm-db

  # Основная база данных
  ewm-db:
    image: postgres:14-alpine
    container_name: ewm-db
    ports:
      - "5432:5432" # Оставляем стандартный порт
    environment:
      - POSTGRES_DB=ewm
      - POSTGRES_USER=practicum
      - POSTGRES_PASSWORD=practicum