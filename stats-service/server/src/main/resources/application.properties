server.port=9090

spring.datasource.driverClassName=org.postgresql.Driver

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:6543/stats}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:practicum}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:practicum}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always
